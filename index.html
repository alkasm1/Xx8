<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALM Super QR - Mobile</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #0BA37F;
            --secondary-color: #2c7da0;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-family: 'Cairo';
            font-size: 16px;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            font-weight: bold;
        }

        /* Content Area */
        .content-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 80px; /* Space for FAB */
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards & Inputs */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h3 { margin-top: 0; font-size: 18px; color: var(--primary-color); }
        
        textarea, input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Cairo';
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active { transform: scale(0.98); }
        .btn-secondary { background: var(--secondary-color); }

        /* QR Display */
        .qr-result-box {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 15px;
        }
        .qr-result-box canvas, .qr-result-box img {
            max-width: 100%;
            height: auto;
        }

        /* Floating Scan Button */
        #scan-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* Camera Scanner Overlay */
        #reader-container {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
        }
        #reader { width: 100%; height: 100%; }
        .close-scanner {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            z-index: 1001;
        }
        
        .status-msg {
            font-size: 14px;
            text-align: center;
            color: #666;
            margin: 10px 0;
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
</head>
<body>

<header>ALM Multi-QR Encoder</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('encode')"><i class="fas fa-qrcode"></i> تشفير</button>
    <button class="tab-btn" onclick="showTab('decode')"><i class="fas fa-unlock-alt"></i> فك التشفير</button>
</div>

<div class="content-container">
    
    <!-- Tab: Encode -->
    <div id="encode-tab" class="tab-content active">
        <div class="card">
            <h3>مُدخلات النص</h3>
            <textarea id="inputText" rows="4" placeholder="اكتب النص هنا أو حمل ملفاً..."></textarea>
            
            <label style="font-size: 12px;">تحميل PDF أو Word:</label>
            <input type="file" id="fileInput" accept=".pdf,.docx">
            
            <label style="font-size: 12px;">مفتاح التشفير (رقمي):</label>
            <input id="userKey" type="number" value="123456789">
            
            <button onclick="startEncoding()"><i class="fas fa-magic"></i> توليد باركودات</button>
        </div>
        
        <div id="encodingStatus" class="status-msg"></div>

        <button id="mergeBtn" class="btn-secondary" onclick="mergeToSuperQR()" style="display:none;">
            ✨ دمج في باركود واحد (Super QR)
        </button>

        <div id="qrList"></div>
        <div id="superQrContainer" class="qr-result-box" style="display:none;"></div>
    </div>

    <!-- Tab: Decode -->
    <div id="decode-tab" class="tab-content">
        <div class="card">
            <h3>فك تشفير الصور</h3>
            <p style="font-size: 13px;">اختر صور الباركود من الاستوديو لدمجها وفكها.</p>
            <input type="file" id="qrFiles" accept="image/*" multiple>
            <button onclick="decodeMultipleQR()"><i class="fas fa-layer-group"></i> معالجة الصور المختارة</button>
            <button class="btn-secondary" onclick="decodeSuperQR()"><i class="fas fa-star"></i> فك Super QR من صورة</button>
        </div>

        <div class="card">
            <h3>النص المستخرج:</h3>
            <div id="finalOutput" style="background:#f9f9f9; padding:10px; border-radius:8px; min-height:100px; white-space: pre-wrap; font-size: 14px;"></div>
            <button onclick="copyToClipboard()" id="copyBtn" style="display:none; background:#555;"><i class="fas fa-copy"></i> نسخ النص</button>
        </div>
    </div>
</div>

<!-- Floating Scan Button -->
<div id="scan-btn" onclick="openScanner()">
    <i class="fas fa-camera"></i>
</div>

<!-- Camera Scanner Overlay -->
<div id="reader-container">
    <span class="close-scanner" onclick="closeScanner()">&times;</span>
    <div id="reader"></div>
</div>

<script>
    /* Logic: Core ALM functions from your code */
    const B = 32; const LMAX = 12; const f0 = 100000n; const df = 1n;
    const indexToChar = {0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي",29:"ء"};
    const charToIndex = {}; for (const [i,ch] of Object.entries(indexToChar)) { if (ch) charToIndex[ch] = parseInt(i, 10); }

    function normalizeArabic(s) {
        return (s || "").replace(/[إأآ]/g, "ا").replace(/ى/g, "ي").replace(/ؤ/g, "و").replace(/ئ/g, "ي").replace(/ة/g, "ه").replace(/[^ءاأإآبتثجحخدذرزسشصضطظعغفقكلمنهوي\s]/g, "");
    }

    function bigIntToBase36(n) { return n.toString(36); }
    function base36ToBigInt(str) {
        let res = 0n;
        for (let i = 0; i < str.length; i++) { res = res * 36n + BigInt(parseInt(str[i], 36)); }
        return res;
    }

    function wordToCode(word){
        const c = new Array(LMAX).fill(0);
        let pos = 0;
        for (let i = word.length - 1; i >= 0; i--){
            const idx = charToIndex[word[i]];
            if (idx !== undefined) c[pos++] = idx;
        }
        let C = 0n;
        for (let i = 0; i < LMAX; i++){ C += BigInt(c[i]) * (BigInt(B) ** BigInt(i)); }
        return C;
    }

    function codeToWord(Cbig){
        let C = BigInt(Cbig); const digits = [];
        for (let i = 0; i < LMAX; i++){ digits.push(Number(C % BigInt(B))); C /= BigInt(B); }
        let w = ""; for (let i = LMAX - 1; i >= 0; i--){ w += indexToChar[digits[i]] || ""; }
        return w;
    }

    function encodeChunkToCodes(chunkText, key) {
        return chunkText.split(/\s+/).map(w => {
            const C = wordToCode(w.slice(0, LMAX)); // Simplify for mobile
            return bigIntToBase36(f0 + (C ^ key) * df);
        }).join(",");
    }

    function decodeCodesToText(codesStr, key) {
        return codesStr.split(",").map(f36 => {
            if (!f36) return "";
            const C = ((base36ToBigInt(f36) - f0) / df) ^ key;
            return codeToWord(C);
        }).join(" ");
    }

    /* UI Logic */
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Camera Scanner logic
    let html5QrCode;
    function openScanner() {
        document.getElementById('reader-container').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                processScannedText(decodedText);
                closeScanner();
            },
            (errorMessage) => {}
        );
    }

    function closeScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader-container').style.display = 'none';
            });
        } else {
            document.getElementById('reader-container').style.display = 'none';
        }
    }

    function processScannedText(text) {
        showTab('decode');
        document.getElementById('finalOutput').textContent = "تم المسح: " + text.substring(0, 50) + "...";
        // Logic to automatically handle if it's super or part
        alert("تم التقاط الباركود! يمكنك الآن الضغط على فك التشفير.");
    }

    /* Mobile Enhancements for encoding */
    let lastGeneratedChunks = [];
    async function startEncoding() {
        const key = BigInt(document.getElementById("userKey").value || "0");
        let text = document.getElementById("inputText").value.trim();
        const file = document.getElementById("fileInput").files[0];

        if (!text && file) {
            document.getElementById("encodingStatus").innerHTML = "⏳ جاري معالجة الملف...";
            if (file.name.endsWith('.pdf')) {
                text = await extractPDFText(file);
            } else {
                text = await extractWordText(file);
            }
        }

        if (!text) return alert("أدخل نصاً أولاً");

        const normalized = normalizeArabic(text);
        const chunks = splitTextIntoChunks(normalized, 1200); // Smaller chunks for better QR stability
        
        const qrList = document.getElementById("qrList");
        qrList.innerHTML = "";
        lastGeneratedChunks = [];

        chunks.forEach((chunk, i) => {
            const codes = encodeChunkToCodes(chunk, key);
            const compressed = LZString.compressToEncodedURIComponent(codes);
            lastGeneratedChunks.push(compressed);
            
            const payload = `part=${i+1}/${chunks.length}|${compressed}`;
            const div = document.createElement("div");
            div.className = "qr-result-box";
            div.innerHTML = `<h4>جزء ${i+1}</h4>`;
            const qrDiv = document.createElement("div");
            div.appendChild(qrDiv);
            new QRCode(qrDiv, { text: payload, width: 200, height: 200 });
            qrList.appendChild(div);
        });

        document.getElementById("mergeBtn").style.display = "block";
        document.getElementById("encodingStatus").innerHTML = `✅ تم توليد ${chunks.length} باركود.`;
    }

    function splitTextIntoChunks(text, size) {
        const regex = new RegExp(`.{1,${size}}(\\s|$)`, 'g');
        return text.match(regex) || [text];
    }

    /* Helper functions */
    async function extractPDFText(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let full = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            full += content.items.map(item => item.str).join(" ") + " ";
        }
        return full;
    }

    async function extractWordText(file) {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
        return result.value;
    }

    function copyToClipboard() {
        const text = document.getElementById("finalOutput").textContent;
        navigator.clipboard.writeText(text).then(() => alert("تم نسخ النص!"));
    }

    // Show copy button when text exists
    const observer = new MutationObserver(() => {
        document.getElementById("copyBtn").style.display = 
            document.getElementById("finalOutput").textContent.length > 0 ? "block" : "none";
    });
    observer.observe(document.getElementById("finalOutput"), { childList: true, characterData: true, subtree: true });

    /* Reuse your original logic for decodeMultipleQR and mergeToSuperQR with UI updates */
    // ... (include the mergeToSuperQR and decodeMultipleQR functions from your code here)
    // Note: I've updated the UI hooks above.
</script>

</body>
</html>
